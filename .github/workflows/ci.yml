# Continuous Integration — runs on every push and pull request.
# If any job fails, GitHub marks the commit/PR with a red ✗ so problems
# are caught before they reach the main branch.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: static checks + unit tests + build ──────────────────────────────
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the repo onto the CI machine
      - uses: actions/checkout@v4

      # 2. Install Node and cache npm downloads for faster runs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install exactly what's in package-lock.json (reproducible builds)
      - name: Install dependencies
        run: npm ci

      # 4. Static analysis — code style and correctness rules
      - name: Lint
        run: npm run lint

      # 5. Unit tests — the rules engine and OSM interpreter
      - name: Test
        run: npm test

      # 6. Type-check + production build — proves the app compiles
      - name: Build
        run: npm run build

  # ── Job 2: end-to-end tests in a real browser ──────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Download the Chromium browser AND the Linux system libraries it needs.
      # --with-deps is what makes browsers work on a bare CI machine.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Run the E2E tests. Playwright starts the dev server itself (see the
      # webServer block in playwright.config.ts) because CI=true here.
      - name: Run Playwright tests
        run: npx playwright test

      # If the E2E step failed, save the HTML report so you can download it
      # from the GitHub run page and see screenshots/traces of what broke.
      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
